version: '3.8'

# ============================================================
# XE KHACH - BUS TICKET SYSTEM - FULL DOCKER COMPOSE
# Infra: Postgres x7, Redis, Kafka, Zookeeper, Kafka UI, Redis Insight, pgAdmin
# Apps : API Gateway, Auth, Route, Vehicle, Trip, Booking, Payment, Notification
# ============================================================

networks:
  bus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_auth_data:
  postgres_route_data:
  postgres_vehicle_data:
  postgres_trip_data:
  postgres_booking_data:
  postgres_payment_data:
  postgres_notification_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  pgadmin_data:
  vehicle_db_data:

services:

  # ============================================================
  # ZOOKEEPER
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bus-zookeeper
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
      ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT: 3
      ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL: 24
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: [ "CMD-SHELL", "echo ruok | timeout 2 bash -c 'cat < /dev/null > /dev/tcp/localhost/2181' && echo imok || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # KAFKA
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bus-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # KAFKA UI - http://localhost:8090
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bus-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bus-ticket-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: 'true'
      AUTH_TYPE: "DISABLED"

  # ============================================================
  # REDIS
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: bus-redis
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "6379:6379"
    command: >
      redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis_secret_2024} --loglevel notice
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_2024}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================================
  # REDIS INSIGHT - http://localhost:5540
  # ============================================================
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: bus-redis-insight
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "5540:5540"

  # ============================================================
  # PGADMIN - http://localhost:5050
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bus-pgadmin
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@xekhach.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres-auth
      - postgres-route
      - postgres-vehicle
      - postgres-trip
      - postgres-booking
      - postgres-payment
      - postgres-notification

  # ============================================================
  # POSTGRESQL - AUTH SERVICE | Port 5433
  # ============================================================
  postgres-auth:
    image: postgres:16-alpine
    container_name: bus-postgres-auth
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U auth_user -d auth_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # POSTGRESQL - ROUTE SERVICE | Port 5434
  # ============================================================
  postgres-route:
    image: postgres:16-alpine
    container_name: bus-postgres-route
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: route_db
      POSTGRES_USER: route_user
      POSTGRES_PASSWORD: ${ROUTE_DB_PASSWORD:-route_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_route_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/route/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U route_user -d route_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # POSTGRESQL - VEHICLE SERVICE | Port 5435
  # ============================================================
  postgres-vehicle:
    image: postgres:16-alpine
    container_name: bus-postgres-vehicle
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: vehicle_db
      POSTGRES_USER: vehicle_user
      POSTGRES_PASSWORD: ${VEHICLE_DB_PASSWORD:-vehicle_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_vehicle_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/vehicle/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vehicle_user -d vehicle_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # POSTGRESQL - TRIP SERVICE | Port 5436
  # ============================================================
  postgres-trip:
    image: postgres:16-alpine
    container_name: bus-postgres-trip
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: trip_db
      POSTGRES_USER: trip_user
      POSTGRES_PASSWORD: ${TRIP_DB_PASSWORD:-trip_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_trip_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/trip/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U trip_user -d trip_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # POSTGRESQL - BOOKING SERVICE | Port 5437
  # ============================================================
  postgres-booking:
    image: postgres:16-alpine
    container_name: bus-postgres-booking
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_booking_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/booking/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U booking_user -d booking_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # POSTGRESQL - PAYMENT SERVICE | Port 5438
  # ============================================================
  postgres-payment:
    image: postgres:16-alpine
    container_name: bus-postgres-payment
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/payment/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U payment_user -d payment_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # POSTGRESQL - NOTIFICATION SERVICE | Port 5439
  # ============================================================
  postgres-notification:
    image: postgres:16-alpine
    container_name: bus-postgres-notification
    restart: unless-stopped
    networks:
      - bus-network
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notif_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/notification/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U notification_user -d notification_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # KAFKA INIT - Tạo topics
  # ============================================================
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bus-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bus-network
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo 'Waiting for Kafka...'
        sleep 5
        echo 'Creating topics...'
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic booking.created
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic booking.cancelled
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic booking.confirmed
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic payment.success
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic payment.failed
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic payment.refunded
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic ticket.issued
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic ticket.checkin
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic notification.send
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic seat.released
        echo 'Topics created!'
        kafka-topics --list --bootstrap-server kafka:29092
    restart: on-failure

  # ============================================================
  # AUTH SERVICE | Port 8081
  # ============================================================
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:-auth_pass_2024}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}

  # ============================================================
  # ROUTE SERVICE | Port 8082
  # ============================================================
  route-service:
    build:
      context: ./route-service
      dockerfile: Dockerfile
    container_name: route-service
    restart: unless-stopped
    depends_on:
      postgres-route:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-route:5432/route_db
      SPRING_DATASOURCE_USERNAME: route_user
      SPRING_DATASOURCE_PASSWORD: ${ROUTE_DB_PASSWORD:-route_pass_2024}
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # VEHICLE SERVICE | Port 8083
  # ============================================================
  vehicle-service:
    build:
      context: ./vehicle-service
      dockerfile: Dockerfile
    container_name: vehicle-service
    restart: unless-stopped
    depends_on:
      postgres-vehicle:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-vehicle:5432/vehicle_db
      SPRING_DATASOURCE_USERNAME: vehicle_user
      SPRING_DATASOURCE_PASSWORD: ${VEHICLE_DB_PASSWORD:-vehicle_pass_2024}
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # TRIP SERVICE | Port 8084
  # ============================================================
  trip-service:
    build:
      context: ./trip-service
      dockerfile: Dockerfile
    container_name: trip-service
    restart: unless-stopped
    depends_on:
      postgres-trip:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-trip:5432/trip_db
      SPRING_DATASOURCE_USERNAME: trip_user
      SPRING_DATASOURCE_PASSWORD: ${TRIP_DB_PASSWORD:-trip_pass_2024}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # BOOKING SERVICE | Port 8085
  # ============================================================
  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    container_name: booking-service
    restart: unless-stopped
    depends_on:
      postgres-booking:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-booking:5432/booking_db
      SPRING_DATASOURCE_USERNAME: booking_user
      SPRING_DATASOURCE_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_pass_2024}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_2024}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # PAYMENT SERVICE | Port 8086
  # ============================================================
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/payment_db
      SPRING_DATASOURCE_USERNAME: payment_user
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD:-payment_pass_2024}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # NOTIFICATION SERVICE | Port 8087
  # ============================================================
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: unless-stopped
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - bus-network
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/notification_db
      SPRING_DATASOURCE_USERNAME: notification_user
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notif_pass_2024}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}

  # ============================================================
  # API GATEWAY | Port 8080 (entry point duy nhất cho client)
  # ============================================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - route-service
      - vehicle-service
      - trip-service
      - booking-service
      - payment-service
      - notification-service
      - redis
    networks:
      - bus-network
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_2024}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8081
      ROUTE_SERVICE_URL: http://route-service:8082
      VEHICLE_SERVICE_URL: http://vehicle-service:8083
      TRIP_SERVICE_URL: http://trip-service:8084
      BOOKING_SERVICE_URL: http://booking-service:8085
      PAYMENT_SERVICE_URL: http://payment-service:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087

  # ============================================================
  # VEHICLE DATABASE (standalone, port 5440)
  # ============================================================
  vehicle-db:
    image: postgres:17-alpine
    container_name: vehicle-db
    environment:
      POSTGRES_DB: vehicle_service_db
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5440:5432"
    volumes:
      - vehicle_db_data:/var/lib/postgresql/data
    networks:
      - bus-network
