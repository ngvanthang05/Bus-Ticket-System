server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:6969/auth_db
    username: postgres
    password: postgres   # đổi theo password thật của bạn
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate     # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Cấu hình JWT riêng, đọc qua @ConfigurationProperties hoặc @Value
app:
  jwt:
    secret: "ZmFrZS1zZWNyZXQta2V5LWNoby1hdXRoLXNlcnZpY2UtY2hhbmctMjU2LWJpdC1taW5pbXVt"  # base64, >= 256 bit
    access-token-expiration-ms: 3600000      # 1 giờ
    refresh-token-expiration-ms: 604800000   # 7 ngày

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.xekhach.auth: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info