server:
  port: 8082

spring:
  application:
    name: route-service
  datasource:
    url: jdbc:postgresql://postgres-route:5432/route_db
    username: ${SPRING_DATASOURCE_USERNAME:route_user}
    password: ${SPRING_DATASOURCE_PASSWORD:route_pass_2024}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.xekhach.routeservice: DEBUG